<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="shortcut icon" href="icon.png" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-title" content="Fran IPTV" />
  <meta name="application-name" content="Fran IPTV" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Fran's Visor IPTV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    :root{
      --bg:#0b1020;
      --card:#151b2f;
      --text:#f5f7ff;
      --muted:#aab2d5;
      --accent:#4da3ff;
      --accent2:#72e0a8;
      --border:rgba(255,255,255,.1);
      --shadow:0 16px 40px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top left,rgba(77,163,255,.25),transparent 35%),
        radial-gradient(circle at bottom right,rgba(114,224,168,.14),transparent 35%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding-bottom:env(safe-area-inset-bottom);
    }

    header{
      position:sticky;
      top:0;
      z-index:20;
      padding:10px 12px;
      background:rgba(11,16,32,.92);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }

    .top-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    h1{
      font-size:1.04rem;
      line-height:1.1;
      margin:0;
      letter-spacing:-.3px;
    }

    .top-actions{display:flex;gap:8px;align-items:center}

    button{
      border:none;
      color:var(--text);
      background:linear-gradient(135deg,var(--accent),#7d5cff);
      font-weight:900;
      cursor:pointer;
    }

    button:active{transform:scale(.98)}

    .icon-btn{
      width:34px;
      height:34px;
      border-radius:999px;
      display:grid;
      place-items:center;
      padding:0;
      font-size:1.25rem;
      line-height:1;
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .tab{
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 8px;
      color:var(--muted);
      background:rgba(255,255,255,.075);
      font-weight:900;
      font-size:.82rem;
      cursor:pointer;
      text-align:center;
    }

    .tab.active{
      background:linear-gradient(135deg,var(--accent),#7d5cff);
      color:white;
      border-color:transparent;
    }

    .hidden-panel{
      display:none;
      margin-top:9px;
      padding:10px;
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(255,255,255,.055);
      gap:8px;
    }

    .hidden-panel.open{display:grid}

    .hidden-panel input{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      font-size:16px;
      color:var(--text);
      background:rgba(255,255,255,.08);
      outline:none;
    }

    .hidden-panel button{
      border-radius:14px;
      padding:11px 12px;
      font-size:.9rem;
    }

    .custom-row{display:grid;grid-template-columns:1fr auto;gap:8px}

    .hint{color:var(--muted);font-size:.78rem;line-height:1.35}

    main{
      display:grid;
      gap:10px;
      padding:10px;
      max-width:1100px;
      margin:0 auto;
    }

    .player-card,.list-card{
      background:rgba(21,27,47,.86);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .player-wrap{
      background:#000;
      aspect-ratio:16/9;
      width:100%;
      display:grid;
      place-items:center;
      position:relative;
    }

    video{width:100%;height:100%;background:#000}

    .player-empty{
      position:absolute;
      text-align:center;
      color:rgba(255,255,255,.7);
      padding:20px;
      pointer-events:none;
    }

    .status{
      color:var(--muted);
      font-size:.84rem;
      padding:10px 12px 0;
    }

    .list-tools{display:grid;gap:8px;padding:10px 12px 0}

    .search-row{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:8px;
      align-items:center;
    }

    .search-toggle,.next-btn{
      border-radius:999px;
      padding:9px 12px;
      font-size:.82rem;
      white-space:nowrap;
    }

    .search-input{
      display:none;
      width:100%;
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 12px;
      font-size:16px;
      color:var(--text);
      background:rgba(255,255,255,.08);
      outline:none;
    }

    .search-input.open{display:block}

    .channels{
      display:grid;
      gap:8px;
      padding:10px 12px 12px;
      max-height:72vh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    .channel{
      display:grid;
      grid-template-columns:62px 1fr;
      gap:11px;
      align-items:center;
      background:rgba(255,255,255,.055);
      border:1px solid var(--border);
      border-radius:18px;
      padding:9px;
      cursor:pointer;
    }

    .channel:active{transform:scale(.99)}
    .channel.match-current{
      border-color:rgba(114,224,168,.8);
      box-shadow:0 0 0 2px rgba(114,224,168,.18);
    }

    .logo{
      width:62px;
      height:44px;
      border-radius:12px;
      background:linear-gradient(135deg,rgba(77,163,255,.18),rgba(125,92,255,.14));
      display:grid;
      place-items:center;
      overflow:hidden;
      color:#dbe7ff;
      font-size:.7rem;
      font-weight:900;
      text-align:center;
    }

    .logo img{
      max-width:92%;
      max-height:92%;
      object-fit:contain;
    }

    .channel-name{font-weight:850;line-height:1.15;margin-bottom:4px}
    .channel-meta{color:var(--muted);font-size:.8rem;overflow-wrap:anywhere}

    @media (min-width:850px){
      main{
        grid-template-columns:minmax(0,1.25fr) minmax(330px,.75fr);
        align-items:start;
      }
      header{padding-inline:22px}
      .channels{max-height:calc(100vh - 162px)}
    }

    @media (max-width:520px){
      h1{font-size:1rem}
      .custom-row,.search-row{grid-template-columns:1fr}
      .search-input{border-radius:14px}
    }
  </style>
</head>

<body>
  <header>
    <div class="top-title">
      <h1>Fran's Visor IPTV</h1>
      <div class="top-actions">
        <button id="plusBtn" class="icon-btn" title="Cargar lista o canal">+</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="Fran">Fran</button>
      <button class="tab" data-tab="Internacional">Internacional</button>
      <button class="tab" data-tab="Variado">Variado</button>
    </div>

    <div id="addPanel" class="hidden-panel">
      <div class="custom-row">
        <input id="customUrl" placeholder="Pega link de lista .m3u o canal .m3u8" />
        <button id="loadCustomBtn">Cargar</button>
      </div>
      <div class="hint">Puedes pegar una lista M3U o un canal M3U8 directo. Si la lista no carga, probablemente el servidor bloquea CORS.</div>
    </div>
  </header>

  <main>
    <section class="player-card">
      <div class="player-wrap">
        <video id="video" controls playsinline webkit-playsinline></video>
        <div id="playerEmpty" class="player-empty">Selecciona un canal para reproducirlo</div>
      </div>
    </section>

    <section class="list-card">
      <div id="status" class="status">Cargando canales...</div>
      <div class="list-tools">
        <div class="search-row">
          <button id="searchBtn" class="search-toggle">Buscar</button>
          <input id="searchInput" class="search-input" placeholder="Nombre del canal..." />
          <button id="nextBtn" class="next-btn">Avanzar</button>
        </div>
      </div>
      <div id="channels" class="channels"></div>
    </section>
  </main>

<script>
const SOURCES = {
  "Fran": "Fran.txt",
  "Internacional": "Internacional.txt",
  "Variado": "Variado.txt"
};

const video = document.getElementById("video");
const playerEmpty = document.getElementById("playerEmpty");
const channelsEl = document.getElementById("channels");
const statusEl = document.getElementById("status");
const tabButtons = document.querySelectorAll(".tab");
const plusBtn = document.getElementById("plusBtn");
const addPanel = document.getElementById("addPanel");
const customUrl = document.getElementById("customUrl");
const loadCustomBtn = document.getElementById("loadCustomBtn");
const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const nextBtn = document.getElementById("nextBtn");

let activeTab = "Fran";
let hls = null;
let cache = {};
let renderedChannelNodes = [];
let searchMatches = [];
let searchIndex = -1;

function getAttr(line, attr){
  const regex = new RegExp(attr + '="([^"]*)"', "i");
  const match = line.match(regex);
  return match ? match[1] : "";
}

function cleanName(name){
  return String(name || "Canal")
    .replace(/\s*\[[^\]]*]/g, "")
    .replace(/\s*\((1080p|1080i|720p|720i|576p|576i|540p|480p|486p|404p|360p|288p|270p|240p|160p|SD|HD|FHD|4K)\)/gi, "")
    .replace(/\s+/g, " ")
    .trim();
}

function parseM3U(text, tabName){
  const lines = text.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
  const channels = [];

  for(let i = 0; i < lines.length; i++){
    const line = lines[i];
    if(!line.startsWith("#EXTINF")) continue;

    const title = line.includes(",") ? line.substring(line.indexOf(",") + 1).trim() : getAttr(line, "tvg-name") || "Canal";
    const tvgName = getAttr(line, "tvg-name") || title;
    const tvgId = getAttr(line, "tvg-id");
    const logo = getAttr(line, "tvg-logo");
    const group = getAttr(line, "group-title") || tabName;

    let url = "";
    for(let j = i + 1; j < lines.length; j++){
      if(lines[j].startsWith("#EXTINF")) break;
      if(lines[j] && !lines[j].startsWith("#")){
        url = lines[j];
        i = j;
        break;
      }
    }

    if(url && (url.startsWith("http://") || url.startsWith("https://"))){
      channels.push({
        tab: tabName,
        displayName: cleanName(tvgName || title),
        name: cleanName(title),
        tvgId,
        logo: logo && (logo.startsWith("http://") || logo.startsWith("https://")) ? logo : "",
        group,
        url
      });
    }
  }

  const seen = new Set();
  return channels.filter(channel => {
    if(seen.has(channel.url)) return false;
    seen.add(channel.url);
    return true;
  });
}

function shortUrl(url){
  try{return new URL(url).hostname}catch{return url}
}

function channelInitials(name){
  const clean = String(name || "TV").replace(/[^a-zA-Z0-9ÁÉÍÓÚÜÑáéíóúüñ ]/g, " ").trim();
  const words = clean.split(/\s+/).filter(Boolean);
  if(!words.length) return "TV";
  if(words.length === 1) return words[0].substring(0, 3).toUpperCase();
  return words.slice(0, 2).map(w => w[0]).join("").toUpperCase();
}

async function loadTab(tabName){
  activeTab = tabName;
  channelsEl.innerHTML = "";
  renderedChannelNodes = [];
  searchMatches = [];
  searchIndex = -1;
  statusEl.textContent = "Cargando " + tabName + "...";

  if(cache[tabName]){
    renderChannels(cache[tabName]);
    return;
  }

  try{
    const response = await fetch(SOURCES[tabName], {cache:"no-store"});
    if(!response.ok) throw new Error("No se pudo abrir " + SOURCES[tabName]);
    const text = await response.text();
    const channels = parseM3U(text, tabName);
    cache[tabName] = channels;
    renderChannels(channels);
  }catch(error){
    statusEl.textContent = "No se pudo cargar " + SOURCES[tabName] + ".";
    channelsEl.innerHTML = '<div class="status">Verifica que index.html, Fran.txt, Internacional.txt y Variado.txt estén juntos.</div>';
  }
}

function getActiveChannels(){
  return cache[activeTab] || [];
}

function renderChannels(channels){
  channelsEl.innerHTML = "";
  renderedChannelNodes = [];
  searchMatches = [];
  searchIndex = -1;

  if(!channels.length){
    statusEl.textContent = "No hay canales en " + activeTab + ".";
    channelsEl.innerHTML = '<div class="status">No hay canales disponibles.</div>';
    return;
  }

  const fragment = document.createDocumentFragment();

  channels.forEach((channel, index) => {
    const item = document.createElement("div");
    item.className = "channel";
    item.dataset.index = index;

    const logo = document.createElement("div");
    logo.className = "logo";
    logo.textContent = channelInitials(channel.displayName || channel.name);

    if(channel.logo){
      const img = document.createElement("img");
      img.src = channel.logo;
      img.alt = channel.displayName || channel.name;
      img.loading = "lazy";
      img.onload = () => { logo.textContent = ""; };
      img.onerror = () => {
        img.remove();
        logo.textContent = channelInitials(channel.displayName || channel.name);
      };
      logo.appendChild(img);
    }

    const info = document.createElement("div");

    const name = document.createElement("div");
    name.className = "channel-name";
    name.textContent = channel.displayName || channel.name;

    const meta = document.createElement("div");
    meta.className = "channel-meta";
    meta.textContent = (channel.group || activeTab) + " · " + shortUrl(channel.url);

    info.appendChild(name);
    info.appendChild(meta);
    item.appendChild(logo);
    item.appendChild(info);
    item.addEventListener("click", () => playChannel(channel));

    renderedChannelNodes.push({node:item, channel, index});
    fragment.appendChild(item);
  });

  channelsEl.appendChild(fragment);
  statusEl.textContent = channels.length + " canales en " + activeTab + ".";
  applySearch(false);
}

function playChannel(channel){
  playerEmpty.style.display = "none";

  if(hls){
    hls.destroy();
    hls = null;
  }

  video.pause();
  video.removeAttribute("src");
  video.load();

  const url = channel.url;
  const isHls = url.includes(".m3u8") || url.includes("m3u8");

  if(video.canPlayType("application/vnd.apple.mpegurl")){
    video.src = url;
    video.play().catch(() => {});
  }else if(isHls && window.Hls && Hls.isSupported()){
    hls = new Hls({enableWorker:true, lowLatencyMode:true});
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    hls.on(Hls.Events.ERROR, (_, data) => {
      if(data && data.fatal){
        try{hls.destroy()}catch(e){}
        hls = null;
      }
    });
  }else{
    video.src = url;
    video.play().catch(() => {});
  }
}

function applySearch(jumpToFirst = true){
  const query = searchInput.value.trim().toLowerCase();

  renderedChannelNodes.forEach(item => {
    item.node.style.display = "";
    item.node.classList.remove("match-current");
  });

  if(!query){
    statusEl.textContent = getActiveChannels().length + " canales en " + activeTab + ".";
    searchMatches = [];
    searchIndex = -1;
    return;
  }

  searchMatches = renderedChannelNodes.filter(item => {
    const text = (item.channel.displayName + " " + item.channel.name + " " + item.channel.group + " " + item.channel.tvgId).toLowerCase();
    return text.includes(query);
  });

  renderedChannelNodes.forEach(item => {
    if(!searchMatches.includes(item)) item.node.style.display = "none";
  });

  statusEl.textContent = searchMatches.length + " resultado(s) para “" + searchInput.value.trim() + "” en " + activeTab + ".";

  if(jumpToFirst && searchMatches.length){
    searchIndex = 0;
    focusSearchMatch();
  }
}

function focusSearchMatch(){
  renderedChannelNodes.forEach(item => item.node.classList.remove("match-current"));
  if(!searchMatches.length) return;

  if(searchIndex < 0) searchIndex = 0;
  if(searchIndex >= searchMatches.length) searchIndex = 0;

  const current = searchMatches[searchIndex];
  current.node.classList.add("match-current");
  current.node.scrollIntoView({behavior:"smooth", block:"center"});
}

function nextSearchMatch(){
  const query = searchInput.value.trim();
  if(!query){
    searchInput.classList.add("open");
    searchInput.focus();
    return;
  }

  if(!searchMatches.length){
    applySearch(true);
    return;
  }

  searchIndex = (searchIndex + 1) % searchMatches.length;
  focusSearchMatch();
}

async function loadCustomInput(){
  const url = customUrl.value.trim();
  if(!url || !(url.startsWith("http://") || url.startsWith("https://"))) return;

  const lower = url.toLowerCase();

  if(lower.includes(".m3u8")){
    const channel = {
      tab: activeTab,
      displayName: "Canal agregado",
      name: "Canal agregado",
      tvgId: "",
      logo: "",
      group: "Agregado",
      url
    };
    if(!cache[activeTab]) cache[activeTab] = [];
    cache[activeTab].unshift(channel);
    customUrl.value = "";
    renderChannels(cache[activeTab]);
    playChannel(channel);
    return;
  }

  try{
    const response = await fetch(url, {cache:"no-store"});
    if(!response.ok) throw new Error();
    const text = await response.text();

    if(text.includes("#EXTINF")){
      const parsed = parseM3U(text, activeTab);
      if(!cache[activeTab]) cache[activeTab] = [];
      cache[activeTab].unshift(...parsed);
      customUrl.value = "";
      renderChannels(cache[activeTab]);
    }
  }catch(e){
    statusEl.textContent = "No se pudo cargar ese enlace desde el navegador.";
  }
}

tabButtons.forEach(button => {
  button.addEventListener("click", () => {
    tabButtons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
    loadTab(button.dataset.tab);
  });
});

plusBtn.addEventListener("click", () => {
  addPanel.classList.toggle("open");
  if(addPanel.classList.contains("open")) customUrl.focus();
});

loadCustomBtn.addEventListener("click", loadCustomInput);
customUrl.addEventListener("keydown", event => {
  if(event.key === "Enter") loadCustomInput();
});

searchBtn.addEventListener("click", () => {
  searchInput.classList.toggle("open");
  if(searchInput.classList.contains("open")){
    searchInput.focus();
    applySearch(true);
  }else{
    searchInput.value = "";
    applySearch(false);
  }
});

searchInput.addEventListener("input", () => applySearch(true));
searchInput.addEventListener("keydown", event => {
  if(event.key === "Enter") nextSearchMatch();
});

nextBtn.addEventListener("click", nextSearchMatch);

loadTab(activeTab);
</script>
</body>
</html>
