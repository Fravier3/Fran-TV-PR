function playChannel(channel){playerEmpty.style.display='none';if(hls){hls.destroy();hls=null}video.pause();video.removeAttribute('src');video.load();const url=channel.url,isHls=url.includes('.m3u8')||url.includes('m3u8');if(video.canPlayType('application/vnd.apple.mpegurl')){video.src=url;video.play().catch(()=>{})}else if(isHls&&window.Hls&&Hls.isSupported()){hls=new Hls({enableWorker:true,lowLatencyMode:true});hls.loadSource(url);hls.attachMedia(video);hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));hls.on(Hls.Events.ERROR,(_,data)=>{if(data&&data.fatal){try{hls.destroy()}catch(e){}hls=null}})}else{video.src=url;video.play().catch(()=>{})}}
function applySearch(jumpToFirst=true){const query=searchInput.value.trim().toLowerCase();renderedChannelNodes.forEach(item=>{item.node.style.display='';item.node.classList.remove('match-current')});if(!query){const channels=CHANNELS_BY_TAB[activeTab]||[];statusEl.textContent=channels.length+' canales en '+activeTab+'.';searchMatches=[];searchIndex=-1;return}searchMatches=renderedChannelNodes.filter(item=>{const text=(item.channel.displayName+' '+item.channel.name+' '+item.channel.group+' '+item.channel.tvgId).toLowerCase();return text.includes(query)});renderedChannelNodes.forEach(item=>{if(!searchMatches.includes(item))item.node.style.display='none'});statusEl.textContent=searchMatches.length+' resultado(s) para “'+searchInput.value.trim()+'” en '+activeTab+'.';if(jumpToFirst&&searchMatches.length){searchIndex=0;focusSearchMatch()}}
function focusSearchMatch(){renderedChannelNodes.forEach(item=>item.node.classList.remove('match-current'));if(!searchMatches.length)return;if(searchIndex<0)searchIndex=0;if(searchIndex>=searchMatches.length)searchIndex=0;const current=searchMatches[searchIndex];current.node.classList.add('match-current');current.node.scrollIntoView({behavior:'smooth',block:'center'})}
function nextSearchMatch(){const query=searchInput.value.trim();if(!query){searchInput.classList.add('open');searchInput.focus();return}if(!searchMatches.length){applySearch(true);return}searchIndex=(searchIndex+1)%searchMatches.length;focusSearchMatch()}
async function loadCustomInput(){const url=customUrl.value.trim();if(!url)return;if(!(url.startsWith('http://')||url.startsWith('https://')))return;const lower=url.toLowerCase();if(lower.includes('.m3u8')){const channel={tab:activeTab,displayName:'Canal agregado',name:'Canal agregado',tvgId:'',logo:'',group:'Agregado',url};CHANNELS_BY_TAB[activeTab].unshift(channel);customUrl.value='';renderChannels();playChannel(channel);return}try{const response=await fetch(url,{cache:'no-store'});if(!response.ok)throw new Error();const text=await response.text();if(text.includes('#EXTINF')){const parsed=parseM3U(text,activeTab);CHANNELS_BY_TAB[activeTab].unshift(...parsed);customUrl.value='';renderChannels()}else{const channel={tab:activeTab,displayName:'Canal agregado',name:'Canal agregado',tvgId:'',logo:'',group:'Agregado',url};CHANNELS_BY_TAB[activeTab].unshift(channel);customUrl.value='';renderChannels();playChannel(channel)}catch(e){statusEl.textContent='No se pudo cargar ese enlace desde el navegador.'}}
tabButtons.forEach(button=>{button.addEventListener('click',()=>{activeTab=button.dataset.tab;tabButtons.forEach(btn=>btn.classList.remove('active'));button.classList.add('active');renderChannels()})});plusBtn.addEventListener('click',()=>{addPanel.classList.toggle('open');if(addPanel.classList.contains('open'))customUrl.focus()});loadCustomBtn.addEventListener('click',loadCustomInput);customUrl.addEventListener('keydown',event=>{if(event.key==='Enter')loadCustomInput()});searchBtn.addEventListener('click',()=>{searchInput.classList.toggle('open');if(searchInput.classList.contains('open')){searchInput.focus();applySearch(true)}else{searchInput.value='';applySearch(false)}});searchInput.addEventListener('input',()=>applySearch(true));searchInput.addEventListener('keydown',event=>{if(event.key==='Enter')nextSearchMatch()});nextBtn.addEventListener('click',nextSearchMatch);renderChannels();
</script>
</body></html>
