<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fran's Visor IPTV PR + Colombia Manual</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    header {
      padding: 14px;
      background: #111;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    .container {
      padding: 12px;
      max-width: 900px;
      margin: auto;
    }

    video {
      width: 100%;
      background: black;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #0d6efd;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0b5ed7;
    }

    #hiddenButton,
    .hidden-button,
    button.hidden {
      display: none !important;
      visibility: hidden !important;
    }

    .section-title {
      margin: 16px 0 8px;
      font-weight: bold;
      font-size: 18px;
      color: #ddd;
    }

    .channel {
      padding: 12px;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .channel:hover {
      background: #252525;
    }

    .channel small {
      display: block;
      color: #aaa;
      margin-top: 4px;
      word-break: break-all;
    }

    .status {
      padding: 10px;
      background: #151515;
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 12px;
      color: #ccc;
      font-size: 14px;
      word-break: break-word;
    }
  </style>
</head>
<body>

<header>Fran's Visor IPTV PR + Colombia Manual</header>

<div class="container">

  <video id="video" controls playsinline webkit-playsinline></video>

  <div id="status" class="status">Selecciona un canal.</div>

  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Buscar canal..." />
    <button onclick="buscarCanales()">Buscar</button>
  </div>

  <!-- Este botÃ³n queda escondido como pediste -->
  <button id="hiddenButton" style="display:none;">BotÃ³n oculto</button>

  <div class="section-title">Colombia Manual</div>
  <div id="manualChannels"></div>

  <div class="section-title">Puerto Rico</div>
  <div id="channels"></div>

</div>

<script>
  const PR_M3U_URL = "https://iptv-org.github.io/iptv/countries/pr.m3u";

  /*
    IMPORTANTE:
    Este es tu Worker de Cloudflare.
    El HTML ahora SÃ le manda el parÃ¡metro ?url=
    Ejemplo final:
    https://withered-leaf-0a9f.fjvs1993.workers.dev/?url=http%3A%2F%2F...
  */
  const WORKER_URL = "https://withered-leaf-0a9f.fjvs1993.workers.dev/";

  const manualChannels = [
    {
      name: "Caracol HD",
      country: "Colombia",
      url: "http://181.78.8.199:45000/play/a00f/index.m3u8",
      forceProxy: true
    },
    {
      name: "RCN HD",
      country: "Colombia",
      url: "http://181.78.8.199:45000/play/a00g/index.m3u8",
      forceProxy: true
    }
  ];

  let prChannels = [];
  let allChannels = [];

  const video = document.getElementById("video");
  const statusBox = document.getElementById("status");
  const channelsBox = document.getElementById("channels");
  const manualBox = document.getElementById("manualChannels");
  const searchInput = document.getElementById("searchInput");

  function setStatus(text) {
    statusBox.textContent = text;
  }

  function needsProxy(channel) {
    return channel.forceProxy === true || channel.url.startsWith("http://");
  }

  function buildPlayableUrl(channel) {
    /*
      ESTE ES EL ARREGLO:
      Para Caracol, RCN y cualquier canal http://,
      se manda el enlace dentro del parÃ¡metro ?url=
    */
    if (needsProxy(channel)) {
      return WORKER_URL + "?url=" + encodeURIComponent(channel.url);
    }

    return channel.url;
  }

  function playChannel(channel) {
    const playableUrl = buildPlayableUrl(channel);

    setStatus("Cargando: " + channel.name + " | URL enviada: " + playableUrl);

    if (window.hls) {
      window.hls.destroy();
      window.hls = null;
    }

    if (Hls.isSupported()) {
      window.hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true
      });

      window.hls.loadSource(playableUrl);
      window.hls.attachMedia(video);

      window.hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(function(err) {
          setStatus("Canal cargado, pero toca Play manualmente: " + channel.name);
        });
      });

      window.hls.on(Hls.Events.ERROR, function (event, data) {
        console.log("HLS error:", data);
        setStatus("Error cargando " + channel.name + ". Revisa si el link estÃ¡ activo o si el Worker estÃ¡ desplegado.");
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = playableUrl;
      video.play().catch(function() {
        setStatus("Canal cargado, pero toca Play manualmente: " + channel.name);
      });
    } else {
      setStatus("Tu navegador no soporta HLS.");
    }
  }

  function renderChannels(list, container) {
    container.innerHTML = "";

    if (!list.length) {
      container.innerHTML = '<div class="channel">No se encontraron canales.</div>';
      return;
    }

    list.forEach(function(channel) {
      const div = document.createElement("div");
      div.className = "channel";
      div.innerHTML = `
        <strong>${channel.name}</strong>
        <small>${channel.country || ""}</small>
        <small>${channel.url}</small>
      `;
      div.onclick = function() {
        playChannel(channel);
      };
      container.appendChild(div);
    });
  }

  function parseM3U(text) {
    const lines = text.split(/\r?\n/);
    const channels = [];

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();

      if (line.startsWith("#EXTINF")) {
        const nameMatch = line.match(/,(.*)$/);
        const tvgNameMatch = line.match(/tvg-name="([^"]+)"/);
        const groupMatch = line.match(/group-title="([^"]+)"/);

        const name = tvgNameMatch ? tvgNameMatch[1] : (nameMatch ? nameMatch[1] : "Canal sin nombre");
        const country = groupMatch ? groupMatch[1] : "Puerto Rico";

        let url = "";
        for (let j = i + 1; j < lines.length; j++) {
          const nextLine = lines[j].trim();
          if (nextLine && !nextLine.startsWith("#")) {
            url = nextLine;
            break;
          }
        }

        if (url) {
          channels.push({
            name: name,
            country: country,
            url: url,
            forceProxy: false
          });
        }
      }
    }

    return channels;
  }

  async function cargarPuertoRico() {
    try {
      setStatus("Cargando lista de Puerto Rico...");

      const response = await fetch(PR_M3U_URL);
      const text = await response.text();

      prChannels = parseM3U(text);
      allChannels = manualChannels.concat(prChannels);

      renderChannels(manualChannels, manualBox);
      renderChannels(prChannels, channelsBox);

      setStatus("Listo. Selecciona Caracol, RCN o un canal de Puerto Rico.");
    } catch (error) {
      console.error(error);
      renderChannels(manualChannels, manualBox);
      setStatus("No se pudo cargar Puerto Rico, pero Colombia Manual estÃ¡ disponible.");
    }
  }

  function buscarCanales() {
    const term = searchInput.value.trim().toLowerCase();

    if (!term) {
      renderChannels(manualChannels, manualBox);
      renderChannels(prChannels, channelsBox);
      return;
    }

    const filteredManual = manualChannels.filter(function(channel) {
      return channel.name.toLowerCase().includes(term) ||
             channel.url.toLowerCase().includes(term) ||
             (channel.country || "").toLowerCase().includes(term);
    });

    const filteredPR = prChannels.filter(function(channel) {
      return channel.name.toLowerCase().includes(term) ||
             channel.url.toLowerCase().includes(term) ||
             (channel.country || "").toLowerCase().includes(term);
    });

    renderChannels(filteredManual, manualBox);
    renderChannels(filteredPR, channelsBox);
  }

  searchInput.addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
      buscarCanales();
    }
  });

  cargarPuertoRico();
</script>

</body>
</html>
